<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>


<div class="container text-dark-emphasis border rounded-3- shadow-lg p-3 mb-5 bg-body-tertiary rounded" style="margin-top:50px">
    <h1 class="text-center" style="margin-top:30px">Cadastro de aluno</h1>
    <p class="text-center">Preencha os dados abaixo para realizar o registro completo do aluno no sistema acadêmico</p>
 <form class="row g-3 needs-validation" novalidate>
  <div class="col-md-6">
    <label for="validationCustom01" class="form-label">Nome Completo</label>
    <input type="text" class="form-control" id="validationCustom01" >
    <div class="valid-feedback">
     
    </div>
  </div>
  <div class="col-md-6">
    <label for="validationCustom02" class="form-label">CPF</label>
    <input type="text" class="form-control" id="validationCustom02" >
    <div class="valid-feedback">
    
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustomUsername" class="form-label">gmail</label>
    <div class="input-group has-validation">
      <span class="input-group-text" id="inputGroupPrepend">@</span>
      <input type="text" class="form-control" id="validationCustomUsername" aria-describedby="inputGroupPrepend" required>
      <div class="invalid-feedback">
       
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustom03" class="form-label">Data de nascimento </label>
    <input type="text" class="form-control" id="validationCustom03" required>
    <div class="invalid-feedback">
   
    </div>
  </div>
  <div class="col-md-4">
    <label for="validationCustom05" class="form-label">telefone</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
</div>
  </div>
  <div class="col-md-12">
    <label for="validationCustom05" class="form-label">Endereço completo</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="validationCustom05" class="form-label">Cidade</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="validationCustom05" class="form-label">Estado </label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="validationCustom05" class="form-label">CEP</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="validationCustom05" class="form-label">Curso</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="validationCustom05" class="form-label">Matríula</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="validationCustom05" class="form-label">Senha</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
    </div>
  </div>

  <div class="col-md-4">
    <label for="validationCustom05" class="form-label">Confirmar senha</label>
    <input type="text" class="form-control" id="validationCustom05" required>
    <div class="invalid-feedback">
    </div>
  </div>


  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
      <label class="form-check-label" for="invalidCheck">
        
      </label>
      <div class="invalid-feedback">
        
      </div>
    </div>
  </div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Cadastar aluno</button>
   
  </div>
</form>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
